    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzRbblL6gRF6Gks-PfszVW_MoeCINaMl34Dqd1WrJKywhkAGlGxsFD0mswjX80438iX5w/exec';
        let dataTable;

        function downloadExcel() { window.location.href = "https://docs.google.com/spreadsheets/d/1nOesGnsv9ODXjfP0N1qVUACAyaGZmf--c29ZUUCffnU/export?format=xlsx"; }
        function copyLink(e) {
            navigator.clipboard.writeText("https://docs.google.com/spreadsheets/d/1nOesGnsv9ODXjfP0N1qVUACAyaGZmf--c29ZUUCffnU/edit?usp=sharing").then(() => {
                const btn = e.currentTarget; const ori = btn.innerHTML;
                btn.innerHTML = `<i class="fa-solid fa-check me-2"></i> Copied!`;
                setTimeout(() => { btn.innerHTML = ori; }, 2000);
            });
        }

        // ==========================================
        // LOGIKA FILTER TANGGAL DATATABLES (BARU)
        // ==========================================
        $.fn.dataTable.ext.search.push(
            function(settings, data, dataIndex) {
                let minDateStr = $('#minDate').val();
                let maxDateStr = $('#maxDate').val();
                let tableDateStr = data[0]; // Mengambil data dari Kolom Tanggal (Index 0)

                // Jika input filter kosong, tampilkan semua data
                if (!minDateStr && !maxDateStr) {
                    return true;
                }

                // Normalisasi string ke bentuk Date Javascript untuk perbandingan akurat
                let minDate = minDateStr ? new Date(minDateStr) : null;
                let maxDate = maxDateStr ? new Date(maxDateStr) : null;
                let tableDate = new Date(tableDateStr);

                // Hilangkan waktu jam agar komparasi murni pada tanggalnya saja
                if (minDate) minDate.setHours(0,0,0,0);
                if (maxDate) maxDate.setHours(0,0,0,0);
                if (!isNaN(tableDate.getTime())) tableDate.setHours(0,0,0,0);

                if (minDate && maxDate) {
                    return tableDate >= minDate && tableDate <= maxDate;
                } else if (minDate) {
                    return tableDate >= minDate;
                } else if (maxDate) {
                    return tableDate <= maxDate;
                }
                return true;
            }
        );

        // Event listener saat input kalender diubah
        $('#minDate, #maxDate').on('change', function () {
            if (dataTable) {
                dataTable.draw(); // Merender ulang tabel sesuai filter
            }
        });

        // Tombol Reset Filter
        $('#btnResetFilter').on('click', function() {
            $('#minDate').val('');
            $('#maxDate').val('');
            if (dataTable) {
                dataTable.draw(); 
            }
        });
        // ==========================================

        async function loadTableData() {
            try {
                if(dataTable) $('#tabelLaporan tbody').html('<tr><td colspan="9" class="text-center py-4"><div class="spinner-border text-success"></div><p>Memuat data...</p></td></tr>');

                const response = await fetch(scriptURL);
                const dataObj = await response.json();
                
                if (dataObj.result === 'success') {
                    const formattedData = dataObj.data.map(row => {
                        if(row[6] && row[6].toString().startsWith('http')) {
                            row[6] = `<a href="${row[6]}" target="_blank" class="btn btn-sm btn-outline-primary"><i class="fa-solid fa-image"></i> Lihat</a>`;
                        } else { row[6] = `<span class="badge bg-secondary">Tidak ada</span>`; }
                        return row;
                    });

                    if (dataTable) dataTable.destroy();
                    dataTable = $('#tabelLaporan').DataTable({
                        data: formattedData,
                        order: [[0, "desc"], [1, "desc"]], // Mengurutkan descending otomatis (data terbaru di atas)
                        language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/id.json' }
                    });
                }
            } catch (error) { console.error("Gagal memuat data:", error); }
        }

        $(document).ready(function() { loadTableData(); });
    </script>
