    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        feather.replace();
        
        // PASTIKAN URL INI ADALAH URL DEPLOYMENT VERSI TERBARU ANDA
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxvzN5h0gegLccNaGSmunQmDPyD0h8xnlCg_ILCtfuObOgG0yW6CsLm5uJi-G1TlUqwUA/exec';
        let calendar;

        // FUNGSI HELPER: Mencegah bug zona waktu (Timezone shift)
        function formatLokalTanggal(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            var calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                themeSystem: 'bootstrap5',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,listWeek'
                },
                events: [], 
                eventClick: function(info) {
                    document.getElementById('modalTitle').innerText = info.event.title;
                    let startStr = info.event.start.toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});
                    
                    let endObj = new Date(info.event.endStr || info.event.startStr);
                    // FullCalendar mengatur tanggal end +1 hari di sistemnya, jadi kita kurangi 1 hari agar tampilan sesuai
                    endObj.setDate(endObj.getDate() - 1);
                    let endStr = endObj.toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});

                    document.getElementById('modalStart').innerText = startStr;
                    document.getElementById('modalEnd').innerText = endStr;
                    document.getElementById('modalTargetDesc').innerText = info.event.extendedProps.targetDesc;
                    document.getElementById('modalKendala').innerText = info.event.extendedProps.kendala;

                    var eventModal = new bootstrap.Modal(document.getElementById('eventModal'));
                    eventModal.show();
                }
            });
            calendar.render();
            await fetchCalendarData();
        });

        async function fetchCalendarData() {
            try {
                const response = await fetch(scriptURL);
                const dataObj = await response.json();
                
                if (dataObj.result === 'success') {
                    let calendarEvents = []; 
                    const paletWarna = ['#0d6efd', '#198754', '#6f42c1', '#f6c23e', '#e74a3b', '#0dcaf0', '#e83e8c', '#20c997'];
                    let indeksWarna = 0;

                    dataObj.data.forEach(row => {
                        // Cek apakah data ini adalah Hari Kerja dan Memiliki Tanggal Target
                        if(row[4] !== "Hari Libur" && row[4] !== "Jam Istirahat") {
                            
                            let rawStartDate = row[0]; // Kolom A: Tanggal
                            let rawTargetDate = row[6]; // Kolom G: Tanggal Target

                            // Pastikan ada tanggal dan bukan strip "-"
                            if (rawTargetDate && rawTargetDate.trim() !== "-" && rawTargetDate.trim() !== "") {
                                let startDate = new Date(rawStartDate);
                                let endDate = new Date(rawTargetDate);

                                // Validasi agar kalender tidak crash bila ada format tanggal yg salah di Excel
                                if (!isNaN(endDate.getTime()) && !isNaN(startDate.getTime())) {
                                    
                                    endDate.setDate(endDate.getDate() + 1); 
                                    
                                    let warnaDipilih = paletWarna[indeksWarna % paletWarna.length];
                                    indeksWarna++;

                                    // Memasukkan data dengan fungsi formatLokalTanggal() agar 100% AMAN dari bug kemunduran hari
                                    calendarEvents.push({
                                        title: row[3], 
                                        start: formatLokalTanggal(startDate), 
                                        end: formatLokalTanggal(endDate),
                                        allDay: true, 
                                        backgroundColor: warnaDipilih, 
                                        borderColor: warnaDipilih,
                                        textColor: (warnaDipilih === '#f6c23e' || warnaDipilih === '#0dcaf0') ? '#000000' : '#ffffff',
                                        extendedProps: { targetDesc: row[7], kendala: row[5] }
                                    });
                                }
                            }
                        }
                    });

                    calendar.addEventSource(calendarEvents);
                    document.getElementById('calendar-loading').classList.add('d-none');
                    document.getElementById('calendar').classList.remove('d-none');
                    calendar.render(); 
                } else {
                    throw new Error("Gagal mengambil data dari Google Apps Script.");
                }
            } catch (error) { 
                console.error("Gagal memuat data:", error);
                document.getElementById('calendar-loading').innerHTML = '<span class="text-danger fw-bold"><i class="fas fa-exclamation-triangle me-2"></i>Gagal terhubung ke Database. (Cek Koneksi atau Format Data)</span>';
            }
        }
    </script>
